# XcodeGen project definition — the source of truth for the Xcode project.
# Edit this file (not the generated .xcodeproj), then run `xcodegen generate`.
# See README.md. The generated Nook.xcodeproj + Nook-Info.plist are gitignored.

name: Nook

options:
  bundleIdPrefix: ai.lorebooks
  deploymentTarget:
    iOS: "18.0"          # SwiftData needs 17+; we run on the iPhone 17 Pro / iOS 26.1 sim
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 5 language mode for the scaffold — avoids strict-concurrency churn while
    # we stand the app up. Bump to 6 once the sync layer settles.
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  # Local, one-line-patched copy of PowerSync 1.14.3 (weak let -> weak var) for
  # Xcode 26.1 / Swift 6.2 compatibility. Run Scripts/vendor-powersync.sh to fetch
  # it; revert to the remote pin once upstream ships a fix.
  PowerSync:
    path: Vendor/powersync-swift

targets:
  Nook:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: PowerSync
        product: PowerSync
    info:
      path: Nook-Info.plist
      properties:
        CFBundleDisplayName: Nook
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Voice dictation in the AI capture bar (Speech framework).
        NSMicrophoneUsageDescription: Nook uses the microphone so you can speak an event into the capture bar.
        NSSpeechRecognitionUsageDescription: Nook transcribes your speech on-device to add events by voice.
        # Dev only: allow plain-HTTP to localhost/the tailnet (no TLS in local stack).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.lorebooks.nook
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only — this is the phone companion
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_TESTABILITY: YES              # @testable import Nook from the tests
    scheme:
      testTargets:
        - NookTests
      gatherCoverageData: true

  NookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Nook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.lorebooks.nook.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nook.app/Nook"
        BUNDLE_LOADER: "$(TEST_HOST)"
