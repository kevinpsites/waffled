# XcodeGen project definition — the source of truth for the Xcode project.
# Edit this file (not the generated .xcodeproj), then run `xcodegen generate`.
# See README.md. The generated Waffled.xcodeproj + Waffled-Info.plist are gitignored.

name: Waffled

options:
  bundleIdPrefix: app.waffled
  deploymentTarget:
    iOS: "18.0"          # SwiftData needs 17+; we run on the iPhone 17 Pro / iOS 26.1 sim
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.2.3"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 5 language mode for the scaffold — avoids strict-concurrency churn while
    # we stand the app up. Bump to 6 once the sync layer settles.
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  # Local, one-line-patched copy of PowerSync 1.14.3 (weak let -> weak var) for
  # Xcode 26.1 / Swift 6.2 compatibility. Run Scripts/vendor-powersync.sh to fetch
  # it; revert to the remote pin once upstream ships a fix.
  PowerSync:
    path: Vendor/powersync-swift

targets:
  Waffled:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: PowerSync
        product: PowerSync
    info:
      path: Waffled-Info.plist
      properties:
        CFBundleDisplayName: Waffled
        # Version keys MUST point at the build settings — XcodeGen otherwise writes a
        # hardcoded default of "1.0"/"1" into the generated plist, so bumping
        # MARKETING_VERSION (what `./waffled release` does) would silently do nothing
        # and every TestFlight/App Store build would ship as 1.0. These map the plist
        # to settings.base's MARKETING_VERSION / CURRENT_PROJECT_VERSION.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Export compliance: we use only STANDARD encryption (HTTPS/TLS, Keychain,
        # JWT auth) — exempt — so declare it here to skip the "App Encryption
        # Documentation" prompt on every upload. Critical for automated Xcode Cloud
        # → TestFlight builds, which would otherwise stall waiting for a manual answer.
        ITSAppUsesNonExemptEncryption: false
        # Static launch screen: just the warm-white canvas (no white flash). The
        # bouncing logo is drawn by SplashView once SwiftUI takes over — the cream
        # matches so the hand-off is seamless. (Launch screens can't animate.)
        UILaunchScreen:
          UIColorName: LaunchBackground
        # Custom scheme for the Google-calendar OAuth callback (ASWebAuthenticationSession).
        CFBundleURLTypes:
          - CFBundleURLName: app.waffled.oauth
            CFBundleURLSchemes:
              - waffled
        UIApplicationSupportsIndirectInputEvents: true
        # Phone stays portrait-only (personal planner). The iPad family display is
        # wall/counter-mounted, so it allows landscape (natural) + portrait.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        # Voice dictation in the AI capture bar (Speech framework).
        NSMicrophoneUsageDescription: Waffled uses the microphone so you can speak an event into the capture bar.
        # Camera: chore photo-proof + pantry barcode scanning (Open Food Facts lookup).
        NSCameraUsageDescription: Waffled uses the camera to snap chore photo-proof and to scan grocery barcodes into your pantry.
        NSSpeechRecognitionUsageDescription: Waffled transcribes your speech on-device to add events by voice.
        # Dev only: allow plain-HTTP to localhost/the tailnet (no TLS in local stack).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Custom drag type for reordering recipe ingredient rows. Conforms to public.data
        # (NOT public.text) so the rows' text fields don't intercept the drop as text.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: app.waffled.ingredient-row
            UTTypeDescription: Waffled recipe ingredient row
            UTTypeConformsTo:
              - public.data
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.waffled
        TARGETED_DEVICE_FAMILY: "1,2"        # 1=iPhone (planner) + 2=iPad (family-display kiosk)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_TESTABILITY: YES              # @testable import Waffled from the tests
    scheme:
      testTargets:
        - WaffledTests
      gatherCoverageData: true

  WaffledTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Waffled
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.waffled.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Waffled.app/Waffled"
        BUNDLE_LOADER: "$(TEST_HOST)"
