; Waffled-Bite firmware — two environments sharing one app (src/main.cpp +
; src/lgfx_device.h pick the right HAL per target):
;   native     — desktop build, LovyanGFX's SDL2 panel simulates the display +
;                touch (mouse click = tap). No hardware needed. `pio run -e
;                native -t exec` builds and launches it.
;   esp32-s3   — the real ELECROW CrowPanel Basic 7" (ESP32-S3-WROOM-1-N4R8).
;                UNVERIFIED — no board in hand yet; pin mapping/timing are
;                sourced from Elecrow's own example (see lgfx_device.h), but
;                board_build memory settings and the touch wiring haven't been
;                confirmed against real silicon. Treat as a starting point for
;                first bring-up, not a proven config.
;
; docs.platformio.org/page/projectconf.html

[platformio]
default_envs = native

[env:native]
platform = native
build_type = debug
build_flags =
  ; NOT -xc++: LovyanGFX's own PlatformIO_SDL example uses it (everything there is
  ; C++), but it forces LVGL's plain-C .c sources to compile as C++ too, and LVGL's
  ; C code relies on implicit void*->T* conversions that are a hard error in C++.
  -O0 -std=c++14
  -Isrc/
  -DLV_CONF_INCLUDE_SIMPLE
  -lSDL2
  -I"/usr/local/include/SDL2"                 ; Intel Mac homebrew SDL2
  -L"/usr/local/lib"                          ; Intel Mac homebrew SDL2
  -I"${sysenv.HOMEBREW_PREFIX}/include/SDL2"  ; Apple Silicon homebrew SDL2
  -L"${sysenv.HOMEBREW_PREFIX}/lib"           ; Apple Silicon homebrew SDL2
  -I"C:/msys64/mingw32/include/SDL2"          ; Windows SDL2
  -L"C:/msys64/mingw32/lib"                   ; Windows SDL2
lib_deps =
  lovyan03/LovyanGFX@1.2.25
  lvgl/lvgl@8.4.0

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; The stock esp32-s3-devkitc-1 board is an N8 (8MB flash, no PSRAM) devkit — this
; board actually has an N4R8 module (4MB quad flash + 8MB octal PSRAM), so both the
; flash size AND the partition table (sized for 8MB by default) need overriding, or
; a real device would boot into a partition table larger than its physical flash.
; UNVERIFIED end to end — no board in hand yet to confirm psramFound() actually
; comes back true, or that upload/boot works at all with these overrides. Recheck
; on first flash; `esptool.py flash_id` will tell you the truth if this is wrong.
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 4MB
board_build.partitions = default.csv
build_src_filter = +<*> -<sdl_main.cpp>  ; sdl_main.cpp's main() is native-only —
                                          ; Arduino's own main() would conflict.
build_flags =
  -Isrc/
  -DLV_CONF_INCLUDE_SIMPLE
lib_deps =
  lovyan03/LovyanGFX@1.2.25
  lvgl/lvgl@8.4.0
  tamctec/TAMC_GT911@1.0.2
