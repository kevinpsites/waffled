; Waffled-Bite firmware — two environments sharing one app (src/main.cpp +
; src/lgfx_device.h pick the right HAL per target):
;   native     — desktop build, LovyanGFX's SDL2 panel simulates the display +
;                touch (mouse click = tap). No hardware needed. `pio run -e
;                native -t exec` builds and launches it.
;   esp32-p4   — the real board (ELECROW CrowPanel Advanced 7", ESP32-P4,
;                1024x600 MIPI-DSI). UNVERIFIED — no board in hand yet; a
;                clean compile via the community "pioarduino" platform fork
;                is as far as this has been proven (see that env's comments).
;                An earlier ESP32-S3-based board (CrowPanel Basic 7") was
;                targeted before this one and is gone from this file — see
;                git history if that's ever relevant again.
;
; docs.platformio.org/page/projectconf.html

[platformio]
default_envs = native

[env:native]
platform = native
build_type = debug
build_src_filter = +<*> -<wb_http_esp32.cpp> -<wb_store_esp32.cpp> -<wb_wifi_esp32.cpp>  ; Arduino-only (HTTPClient, Preferences, WiFi.h) — see wb_http.h/wb_store.h/wb_wifi.h
build_flags =
  ; NOT -xc++: LovyanGFX's own PlatformIO_SDL example uses it (everything there is
  ; C++), but it forces LVGL's plain-C .c sources to compile as C++ too, and LVGL's
  ; C code relies on implicit void*->T* conversions that are a hard error in C++.
  -O0 -std=c++14
  -Isrc/
  -DLV_CONF_INCLUDE_SIMPLE
  -DWB_API_BASE_URL="\"http://localhost:8081\""  ; default server for native dev — the
                                                  ; onboarding screen's address field
  -lSDL2
  -I"/usr/local/include/SDL2"                 ; Intel Mac homebrew SDL2
  -L"/usr/local/lib"                          ; Intel Mac homebrew SDL2
  -I"${sysenv.HOMEBREW_PREFIX}/include/SDL2"  ; Apple Silicon homebrew SDL2
  -L"${sysenv.HOMEBREW_PREFIX}/lib"           ; Apple Silicon homebrew SDL2
  -I"C:/msys64/mingw32/include/SDL2"          ; Windows SDL2
  -L"C:/msys64/mingw32/lib"                   ; Windows SDL2
  ; libcurl: part of the macOS SDK (no extra -I/-L needed) and most Linux distros
  ; ship it too; on a bare Linux dev box install libcurl4-openssl-dev first.
  -lcurl
lib_deps =
  lovyan03/LovyanGFX@1.2.25
  lvgl/lvgl@9.2.2
  bblanchon/ArduinoJson@7.2.1

; ── native_test: unit tests, `pio test -e native_test` ─────────────────────
; Only wb_boot_flow.cpp — the one piece of the WiFi-provisioning flow with no
; LVGL/hardware dependency, so it's the one piece unit-tested in the classic
; TDD sense. Everything else (the wifi_screen picker UI, the wb_wifi_native
; backend) is verified by driving `native`'s SDL simulator instead — there's
; no harness in this repo for asserting on LVGL widget trees.
[env:native_test]
platform = native
build_type = debug
test_build_src = true
build_src_filter = +<wb_boot_flow.cpp>
build_flags = -Isrc/ -std=c++14

; ── esp32-p4: the real board (ELECROW CrowPanel Advanced 7", ESP32-P4, ─────────
; 1024x600 MIPI-DSI). See the firmware README's bring-up notes for status.
[env:esp32-p4]
; Mainline PlatformIO has NO official ESP32-P4 support as of this writing — the
; community "pioarduino" fork adds it (confirmed via PlatformIO's own community
; forum). Elecrow's own repo documents a PlatformIO path too, so this is a real,
; vendor-acknowledged option, just less proven than mainline.
;
; PINNED to 54.03.21-2, NOT #develop: this board's actual chip is an ESP32-P4
; revision v1.3 "engineering sample" (confirmed via esptool's own
; "Chip type: ESP32-P4 (revision v1.3)" at flash time — NOT the "rev.300"
; production silicon the board name below assumes). pioarduino's #develop
; branch (resolved to platform 55.3.39 at the time this was discovered) has a
; regression that crashes engineering-sample P4 silicon with an illegal-
; instruction panic at the literal bootloader entry point (confirmed via a
; clean single-open serial read during bring-up: `Guru Meditation Error: Core
; 0 panic'ed (Illegal instruction)` at PC 0x4ffac2c0, the exact entry address
; — i.e. the crash is IN THE BOOTLOADER, before any of this project's app code
; ever runs). Matches a known, reported upstream regression — see
; github.com/esphome/esphome/issues/15336 (same PC address, same v1.3 chip)
; and community.platformio.org/t/.../53965, which confirms 54.03.21-2 as the
; last known-working release for this exact silicon. Do NOT move this back to
; #develop without re-verifying on real hardware first.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
; "esp32-p4_r3" (pioarduino's "rev.300" board variant) doesn't exist in the
; 54.03.21-2 release pinned above — that split only appeared in later
; #develop snapshots. Plain "esp32-p4" is what 54.03.21-2 ships, and matches
; this board's actual chip anyway (confirmed via esptool at flash time:
; "revision v1.3", NOT rev.300 — see the platform= comment above). No board
; definition exists for this specific Elecrow product (too obscure/new for
; that); the EV-board-specific variant (esp32-p4-evboard) is deliberately NOT
; used since it bakes in Espressif's own dev-kit peripherals/pin assumptions
; that don't apply to Elecrow's board design.
board = esp32-p4
; framework = espidf, arduino: Arduino built as an ESP-IDF *component*
; instead of plain `framework = arduino` (which links Espressif's separate
; PREBUILT Arduino libs package). This is the fix for the SDIO WiFi crash.
;
; Root cause, found via a systematic bring-up investigation: the P4<->C6
; esp-hosted SDIO link crashed/lost packets in the field on this exact board
; (confirmed via serial capture — a fatal bus_init_internal/"Q create
; failed" assertion, or persistent 0x109 SDIO errors, depending on build).
; Neither esp_hosted host/slave version pairing, SDIO clock speed, bus
; width, nor reset GPIO explained it: every combination of those, built
; through a RAW (non-Arduino) ESP-IDF project, was reliable (dozens of clean
; reboots). The same code built through plain `framework = arduino`
; (Arduino's separate prebuilt-libs package) was flaky regardless of
; whether it was reached via WiFi.h or by calling the underlying esp_wifi_*
; functions directly — meaning the flakiness lives in Arduino's PREBUILT
; esp_hosted/SDIO binary itself, not in any config knob or in WiFi.h's own
; logic. `framework = espidf, arduino` keeps all of this project's
; Arduino-style app code (LVGL, touch, WiFi.h, HTTPClient) unchanged, but
; builds Arduino core + esp_hosted fresh from source under ESP-IDF instead
; of linking that prebuilt package — verified reliable across 15+ real-
; hardware reboot tests (see sdkconfig.defaults for the resulting SDIO
; config, which also fixes the reset-GPIO mismatch below).
framework = espidf, arduino
monitor_speed = 115200
; Works around a genuine link error on this platform/toolchain pin — LVGL's
; ARM-only NEON/Helium blend assembly gets compiled for this RISC-V target
; and its object files carry a conflicting float-ABI tag. See the script's
; own header comment for the full story.
extra_scripts = pre:exclude_lvgl_arm_asm.py
board_upload.flash_size = 16MB
; The stock board definition doesn't set a partition table override, which would
; silently fall back to a 1MB-sized single-factory-app table on a chip with 16MB
; of flash. Contrary to an earlier assumption, board_build.partitions is NOT
; Arduino-only — under espidf+arduino, PlatformIO's own partition-table generator
; runs ahead of (and takes priority over) ESP-IDF's sdkconfig-driven
; CONFIG_PARTITION_TABLE_CUSTOM_FILENAME, so this option still has to be set here
; too (both are set, pointing at the same file, to cover whichever path actually
; runs).
board_build.partitions = default_16MB.csv
; Under espidf+arduino, PlatformIO's LDF ALSO compiles a private, separate copy of
; any Arduino library our own code #includes (here: NetworkClientSecure, pulled in
; transitively via HTTPClient.h) in addition to the one already built into the
; whole-core framework-arduinoespressif32 component — wasteful duplication, so
; skip the private copy. (The undefined-symbol link error this looked like it was
; fixing was actually a separate issue — see sdkconfig.defaults' MBEDTLS_PSK_MODES
; comment for the real cause.)
lib_ignore = NetworkClientSecure
; The stock board definition doesn't set an Arduino partition table override, which
; would silently fall back to the 4MB-sized default.csv on a chip that actually has
; 16MB — default_16MB.csv actually uses the flash this board has. Applied via
; CONFIG_PARTITION_TABLE_CUSTOM_FILENAME in sdkconfig.defaults: the espidf+arduino
; build mode reads the partition table through ESP-IDF's Kconfig, not
; board_build.partitions (that option is Arduino-only).
; NOTE: build_src_filter (used below by the native env) has NO effect once
; ESP-IDF is in the framework list — src/CMakeLists.txt's EXCLUDE_SRCS does
; the same job (excluding the native-only sdl_main/wb_*_native.cpp files)
; for this env instead.
build_flags =
  -Isrc/
  -DLV_CONF_INCLUDE_SIMPLE
  ; WiFi credentials are entered on-device now (ui/wifi_screen.h, backed by
  ; wb_wifi_esp32.cpp), no build-time secret here anymore. WiFi itself is via
  ; the on-board ESP32-C6 co-processor over SDIO (esp-hosted) — verified
  ; reliable on real hardware once built via the espidf+arduino hybrid
  ; framework above.
lib_deps =
  lovyan03/LovyanGFX@1.2.25
  lvgl/lvgl@9.2.2
  tamctec/TAMC_GT911@1.0.2
  bblanchon/ArduinoJson@7.2.1
