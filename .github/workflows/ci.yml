# Run the test suites + typechecks on every PR and on push to main.
#
# The repo is NOT an npm-workspaces monorepo — apps/api and apps/web each have
# their own package.json + package-lock.json (npm). So each job installs with
# `npm ci` in its own app dir and caches on that app's lockfile.
#
# Node 20 to match the runtime (apps/api/Dockerfile + caddy web stage use
# node:20-alpine).
#
# Jobs are independent so the fast ones (typecheck, web tests) fail fast without
# waiting on the slow api job. The api integration/e2e tests use Testcontainers
# (ephemeral Postgres + wiremock, and api.e2e.test.ts builds the Dockerfile),
# which needs Docker — available out of the box on ubuntu-latest.
#
# Scope: this workflow covers apps/api + apps/web (each fully self-contained —
# no root package.json / tsconfig / lockfile, see the note above) plus the
# ./waffled operator CLI (plain-bash tests in tests/waffled.test.sh), so we run
# it ONLY when those paths or this file change. Docs-only, iOS-only (apps/ios is
# built by Xcode Cloud, not here), and website-only PRs skip CI entirely.
# Because CI's coverage *is* api+web+cli, an allowlist can't silently skip
# something it was actually testing. (Safe today because `main` has no
# required-status-check branch protection — a path-skipped run reports nothing,
# which would otherwise block a PR waiting on a required check.)
name: CI

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'waffled'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'waffled'
      - 'tests/**'
      - '.github/workflows/ci.yml'

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrations:
    name: Migration hygiene (no duplicate numbers)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Pure-Node fs check (no deps) — fails the PR if two migrations share an NNNN
      # prefix, so numbering can't silently collide across parallel branches.
      - name: Check migration numbering
        working-directory: apps/api
        run: npm run check:migrations

  cli-tests:
    name: CLI script tests (./waffled, plain bash)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ubuntu's bash is modern (>= 5), so the bash-3.2 empty-array regression these
    # tests were written for only *reproduces* on macOS /bin/bash — but the suite
    # still guards the script's parseability, arg filtering, the upgrade re-exec
    # handoff, and ensure_env secret backfill on every change to ./waffled.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run waffled CLI tests
        run: bash tests/waffled.test.sh

  production-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit API production dependencies
        working-directory: apps/api
        run: npm audit --omit=dev --audit-level=moderate

      - name: Audit web production dependencies
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=moderate

  typecheck:
    name: Typecheck (api + web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install api deps
        working-directory: apps/api
        run: npm ci

      - name: Typecheck api
        working-directory: apps/api
        run: npm run typecheck        # tsc --noEmit

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Typecheck web
        working-directory: apps/web
        run: npm run typecheck        # tsc -b --noEmit

  web-tests:
    name: Web tests (vitest / jsdom)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Run web tests
        working-directory: apps/web
        run: npm test                 # vitest run

  api-tests:
    name: API tests (vitest + Testcontainers)
    runs-on: ubuntu-latest
    # The integration/unit suite now boots ONE shared Postgres (vitest globalSetup)
    # and gives each test file its own isolated database, so files run in parallel
    # (bounded fork pool) instead of each booting its own container. The slow
    # Dockerfile-building e2e test is split out into the `api-e2e` job below, so it
    # no longer serializes this one. Headroom kept generous for a cold Postgres pull.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install api deps
        working-directory: apps/api
        run: npm ci

      # ubuntu-latest ships with Docker running, which is all Testcontainers needs
      # (the shared ephemeral Postgres + wiremock JWKS).
      - name: Run api tests
        working-directory: apps/api
        run: npm test                 # vitest run (unit + integration; excludes api.e2e.test.ts)

  api-e2e:
    name: API e2e (Dockerfile build + real HTTP)
    runs-on: ubuntu-latest
    # api.e2e.test.ts builds the api image from the Dockerfile via Testcontainers and
    # drives the running container over HTTP — minutes of work. It runs as its own
    # parallel job (still on every PR, so coverage is unchanged) rather than inline in
    # api-tests, so a slow image build never gates the fast integration suite.
    #
    # Alternative considered: gate this to push-to-main or a label to save PR minutes.
    # Rejected — keeping it on PRs preserves per-PR coverage; splitting it out already
    # removes the serialization cost, which was the actual problem.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install api deps
        working-directory: apps/api
        run: npm ci

      - name: Run api e2e test
        working-directory: apps/api
        run: npm run test:e2e         # vitest run --config vitest.e2e.config.ts
