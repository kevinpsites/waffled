# Builds the Astro Starlight docs site (website/) and deploys it to GitHub Pages.
#
# ONE-TIME SETUP: enable Pages first — repo Settings → Pages → Source = "GitHub Actions".
# (The default GITHUB_TOKEN can't enable Pages itself, so it can't be automated.) Until
# then this is manual-only (Actions tab → Docs → "Run workflow") so it doesn't red-X on
# every push. Once Pages is on, add a push trigger back for auto-deploy:
#     on:
#       push: { branches: [main], paths: ['website/**', '.github/workflows/docs.yml'] }
#       workflow_dispatch:
#
# Custom domain? Add a `website/public/CNAME` file with your domain and set the base
# to '/' (a user/apex domain serves from the root, so no subpath prefix is needed).
name: Docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # configure-pages computes the correct base for project vs user/org pages.
          DOCS_BASE: ${{ steps.pages.outputs.base_path }}
          DOCS_SITE: ${{ steps.pages.outputs.origin }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
