# Build & publish the Waffled runtime images to GitHub Container Registry (GHCR).
#
# Produces three multi-arch (amd64 + arm64) images that the compose stack can pull
# instead of building from source:
#   ghcr.io/kevinpsites/waffled-api     (apps/api/Dockerfile)
#   ghcr.io/kevinpsites/waffled-caddy   (infra/compose/caddy/Dockerfile — bakes the web SPA)
#   ghcr.io/kevinpsites/waffled-backup  (infra/compose/backup/Dockerfile — backup sidecar)
#
# To run from these instead of building locally, set in infra/compose/.env:
#   WAFFLED_API_IMAGE=ghcr.io/kevinpsites/waffled-api:latest
#   WAFFLED_CADDY_IMAGE=ghcr.io/kevinpsites/waffled-caddy:latest
#   WAFFLED_BACKUP_IMAGE=ghcr.io/kevinpsites/waffled-backup:latest
# then `docker compose pull && ./waffled up`.
#
# Runs ONLY on a version tag (e.g. `git tag v0.1.0 && git push --tags`) or a manual
# dispatch — NOT on every push to main, to conserve Actions minutes.
#
# ── Why this is a build-per-arch + merge, not one QEMU job ─────────────────────────
# Each architecture builds on its OWN native runner (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm — free for public repos) and pushes the image BY DIGEST (no tag).
# A final `merge` job stitches the two per-arch digests into one multi-arch manifest
# carrying the real tags. This avoids QEMU emulation, which made the arm64 `api` build
# take ~40 min and intermittently crash Node ("illegal arguments") mid-`npm`. Native
# builds run in parallel in a few minutes each. (Docker's "distribute build across
# multiple runners" pattern.)
name: Publish images

on:
  push:
    tags: ['v*']            # cut a release: `git tag v1.2.3 && git push origin v1.2.3`
  workflow_dispatch:        # manual "Run workflow" button (builds an sha-tagged image)

# Least-privilege: read the repo, write packages (GHCR).
permissions:
  contents: read
  packages: write

jobs:
  # ── Stage 1: build each image for ONE arch on a native runner, push by digest ──────
  build:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
          - name: caddy
            context: .                     # repo root: the caddy image needs apps/web in context
            dockerfile: infra/compose/caddy/Dockerfile
          - name: backup
            context: infra/compose/backup
            dockerfile: infra/compose/backup/Dockerfile
        platform:
          - { name: linux/amd64, runner: ubuntu-latest }
          - { name: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - name: Prepare platform slug
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform.name }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/waffled-${{ matrix.image.name }}

      - name: Build provenance (baked into the image → /healthz + /api/health)
        id: prov
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.name }}
          labels: ${{ steps.meta.outputs.labels }}
          # Only apps/api/Dockerfile declares these ARGs; caddy/backup ignore them
          # (a harmless "unused build arg" warning). Without this, published images
          # report the ARG defaults (sha=dev, empty build time).
          build-args: |
            GIT_SHA=${{ steps.prov.outputs.sha }}
            BUILD_TIME=${{ steps.prov.outputs.time }}
          # Push a tagless, digest-addressed image; the merge job attaches the tags.
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/waffled-${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 2: per image, merge the per-arch digests into one tagged manifest list ───
  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [api, caddy, backup]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/waffled-${{ matrix.image }}
          # Releases (v* tags) get semver tags + `latest`; manual dispatches get only
          # an sha tag, so a test build never clobbers `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/waffled-${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/waffled-${{ matrix.image }}:${{ steps.meta.outputs.version }}

  # On a version tag, cut a GitHub Release: auto-generated notes + the env template so
  # operators have a canonical, version-matched starting point. Waffled mounts host config
  # (Caddyfile, powersync, postgres/init), so the runnable "matched pair" is the tagged
  # repo itself (`git checkout <tag>` → the compose, configs, and ./waffled that match these
  # images) — hence we attach example.env, not a standalone compose.
  release:
    needs: merge
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the Release + upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release assets
        run: cp infra/compose/.env.example example.env

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: example.env
