# Build & publish the Nook runtime images to GitHub Container Registry (GHCR).
#
# Produces three multi-arch (amd64 + arm64) images that the compose stack can pull
# instead of building from source:
#   ghcr.io/kevinpsites/nook-api     (apps/api/Dockerfile)
#   ghcr.io/kevinpsites/nook-caddy   (infra/compose/caddy/Dockerfile — bakes the web SPA)
#   ghcr.io/kevinpsites/nook-backup  (infra/compose/backup/Dockerfile — backup sidecar)
#
# To run from these instead of building locally, set in infra/compose/.env:
#   NOOK_API_IMAGE=ghcr.io/kevinpsites/nook-api:latest
#   NOOK_CADDY_IMAGE=ghcr.io/kevinpsites/nook-caddy:latest
#   NOOK_BACKUP_IMAGE=ghcr.io/kevinpsites/nook-backup:latest
# then `docker compose pull && ./nook up`.
#
# Runs ONLY on a version tag (e.g. `git tag v0.1.0 && git push --tags`) or a manual
# dispatch — NOT on every push to main, to conserve Actions minutes.
name: Publish images

on:
  push:
    tags: ['v*']            # cut a release: `git tag v1.2.3 && git push origin v1.2.3`
  workflow_dispatch:        # manual "Run workflow" button (builds an sha-tagged image)

# Least-privilege: read the repo, write packages (GHCR).
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
          - name: caddy
            context: .                     # repo root: the caddy image needs apps/web in context
            dockerfile: infra/compose/caddy/Dockerfile
          - name: backup
            context: infra/compose/backup
            dockerfile: infra/compose/backup/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU            # cross-build arm64 on the amd64 runner
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Owner is whatever account/org this repo lives under; l-cased for GHCR.
          images: ghcr.io/${{ github.repository_owner }}/nook-${{ matrix.name }}
          # Releases (v* tags) get semver tags + `latest`; manual dispatches get only
          # an sha tag, so a test build never clobbers `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # On a version tag, cut a GitHub Release: auto-generated notes + the env template so
  # operators have a canonical, version-matched starting point. Nook mounts host config
  # (Caddyfile, powersync, postgres/init), so the runnable "matched pair" is the tagged
  # repo itself (`git checkout <tag>` → the compose, configs, and ./nook that match these
  # images) — hence we attach example.env, not a standalone compose.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the Release + upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release assets
        run: cp infra/compose/.env.example example.env

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: example.env
