# Build & publish the Nook runtime images to GitHub Container Registry (GHCR).
#
# Produces two multi-arch (amd64 + arm64) images that the compose stack can pull
# instead of building from source:
#   ghcr.io/<owner>/nook-api     (apps/api/Dockerfile)
#   ghcr.io/<owner>/nook-caddy   (infra/compose/caddy/Dockerfile — bakes the web SPA)
#
# To run from these instead of building locally, set in infra/compose/.env:
#   NOOK_API_IMAGE=ghcr.io/<owner>/nook-api:latest
#   NOOK_CADDY_IMAGE=ghcr.io/<owner>/nook-caddy:latest
# then `docker compose pull && ./nook up`.
name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:        # manual "Run workflow" button

# Least-privilege: read the repo, write packages (GHCR).
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
          - name: caddy
            context: .                     # repo root: the caddy image needs apps/web in context
            dockerfile: infra/compose/caddy/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU            # cross-build arm64 on the amd64 runner
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Owner is whatever account/org this repo lives under; l-cased for GHCR.
          images: ghcr.io/${{ github.repository_owner }}/nook-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
