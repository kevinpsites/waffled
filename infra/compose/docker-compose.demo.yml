# Override for the THROWAWAY isolated demo stack.
# Used as: docker compose -p waffled-demo -f docker-compose.yml -f docker-compose.demo.yml --env-file .env.demo ...
# Sole purpose: rename the hardcoded container_names so they don't collide with the
# real `waffled` stack's containers on the same Docker daemon. Volumes are already
# isolated automatically (Docker prefixes named volumes with the project name).
services:
  postgres:
    container_name: waffled-demo-postgres
  volume-permissions:
    container_name: waffled-demo-volume-permissions
  migrate:
    container_name: waffled-demo-migrate
  api:
    container_name: waffled-demo-api
  powersync:
    container_name: waffled-demo-powersync
  caddy:
    container_name: waffled-demo-caddy
  backup:
    container_name: waffled-demo-backup
