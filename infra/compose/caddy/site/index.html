<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nook</title>
  <style>
    body { font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
           background: #FAF7F2; color: #1D1D1F;
           display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; padding: 2rem 2.5rem; border-radius: 22px;
            box-shadow: 0 8px 30px rgba(40,33,24,.08); text-align: center; }
    h1 { margin: 0 0 .25rem; font-size: 2rem; }
    p { color: #6B6B70; margin: .25rem 0; }
    code { background: #F4EFE7; padding: .1rem .4rem; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏡 Nook</h1>
    <p>Local stack is running.</p>
    <p>Health: <code>/healthz</code></p>
  </div>
</body>
</html>
