name: nook

# Chunk 2.1 — local runtime: Postgres + Caddy.
# Later chunks add: api, worker, powersync, backup (see ROADMAP.md).
# Everything is env-driven so the same file runs locally and on the tailnet host.

services:
  postgres:
    image: postgres:16
    container_name: nook-postgres
    command:
      - postgres
      - -c
      - wal_level=logical          # required for PowerSync replication (chunk 4.1)
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"          # reachable on localhost / tailnet for psql + tools
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../../apps/api
    container_name: nook-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Local auth (HS256). Leave AUTH0_DOMAIN unset to stay dependency-free.
      # mint-token signs with this same secret, so dev tokens validate.
      LOCAL_JWT_SECRET: ${LOCAL_JWT_SECRET:-nook-local-dev-secret-change-me}
      # Wired now for chunk 2.3 (migrations); unused until the api talks to PG.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Returned by /api/powersync/token so clients know where to connect.
      POWERSYNC_PUBLIC_URL: ${POWERSYNC_PUBLIC_URL:-http://localhost:8090}
      # --- Google Calendar OAuth (5.2): "Connect your calendar". Independent of Auth0.
      # TOKEN_ENCRYPTION_KEY encrypts the stored refresh token (openssl rand -base64 32).
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-}
      GOOGLE_CALENDAR_SCOPES: ${GOOGLE_CALENDAR_SCOPES:-}
      # --- switch to Auth0 (RS256): set these, then restart the api ---
      # AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      # AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    ports:
      - "${API_PORT:-3000}:3000"     # direct dev access; also reachable via Caddy /api/*
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  powersync:
    image: journeyapps/powersync-service:1.22.0
    container_name: nook-powersync
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    command: ['start', '-r', 'unified']    # API server + replication in one container
    volumes:
      - ./powersync:/config:ro             # service.yaml + sync-config.yaml
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
      NODE_OPTIONS: --max-old-space-size=1000
      PS_PORT: 8080
      # Replicate from our DB (needs the `powersync` publication: run `just migrate`).
      PS_DATA_SOURCE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # PowerSync's own bucket storage lives in the powersync_storage database.
      PS_STORAGE_SOURCE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/powersync_storage
      # JWKS our api serves; clients present tokens minted by /api/powersync/token.
      PS_JWKS_URL: ${PS_JWKS_URL:-http://api:3000/api/auth/keys}
    ports:
      - "${POWERSYNC_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/probes/liveness').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  caddy:
    build:
      context: ../..                            # repo root, so the web app is in context
      dockerfile: infra/compose/caddy/Dockerfile
    container_name: nook-caddy
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "${HTTP_PORT:-8080}:80"
      # - "443:443"                              # enable for tailnet/prod TLS (later)
    environment:
      # unset locally → ":80" (plain HTTP); set to your MagicDNS name for auto-TLS
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro   # web build is baked into the image at /srv
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
