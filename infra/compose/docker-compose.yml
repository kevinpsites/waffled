name: waffled

# Local + tailnet runtime: Postgres, Caddy, api, powersync, backup.
# Everything is env-driven so the same file runs locally and on the tailnet host.

services:
  postgres:
    image: postgres:16
    container_name: waffled-postgres
    command:
      - postgres
      - -c
      - wal_level=logical          # required for PowerSync replication (chunk 4.1)
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run ./waffled up to generate POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"          # reachable on localhost / tailnet for psql + tools
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot ownership migration for volumes written by older root-running images.
  # The long-running api and backup services start only after this exits successfully.
  volume-permissions:
    image: ${WAFFLED_BACKUP_IMAGE:-ghcr.io/kevinpsites/waffled-backup:${WAFFLED_VERSION:-latest}}
    build:
      context: ./backup
    container_name: waffled-volume-permissions
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if [ "$$(stat -c %u /data/media)" != "1000" ]; then
          echo "Updating media volume ownership for the api user"
          chown -R 1000:1000 /data/media
        fi
        if [ "$$(stat -c %u /backups)" != "999" ]; then
          echo "Updating backup volume ownership for the postgres user"
          chown -R 999:999 /backups
        fi
    volumes:
      - waffled_media:/data/media
      - ${BACKUP_HOST_PATH:-waffled_backups}:/backups
    restart: "no"

  # One-shot: apply DB migrations, then exit. Reuses the api image (just a different
  # command), so the schema — and the PowerSync publication (migration 0003) — exist
  # before api/powersync start. Idempotent, so it runs harmlessly on every `up`.
  migrate:
    image: ${WAFFLED_API_IMAGE:-ghcr.io/kevinpsites/waffled-api:${WAFFLED_VERSION:-latest}}
    build:
      context: ../../apps/api
    container_name: waffled-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:?Run ./waffled up to generate POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["node", "dist/migrate.js"]
    restart: "no"

  api:
    # Default: the published GHCR image at the pinned WAFFLED_VERSION, so `./waffled up`
    # (and `docker compose pull`) run without a local build. `./waffled up --build` (with
    # the build: block below) builds from source + tags it under this same name locally.
    image: ${WAFFLED_API_IMAGE:-ghcr.io/kevinpsites/waffled-api:${WAFFLED_VERSION:-latest}}
    build:
      context: ../../apps/api
      args:
        # Build provenance, surfaced on /healthz + /api/health. ./waffled passes the
        # real values; a bare `docker compose build` falls back to dev/empty.
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-}
    container_name: waffled-api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      volume-permissions:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      # Local auth (HS256). Leave AUTH0_DOMAIN unset to stay dependency-free.
      # mint-token signs with this same secret, so dev tokens validate.
      LOCAL_JWT_SECRET: ${LOCAL_JWT_SECRET:?Run ./waffled up to generate LOCAL_JWT_SECRET}
      # Session lifetimes (built-in + OIDC login). Empty → code defaults (1h / 60d).
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-}
      # Break-glass: always show the password form even if SSO-only is toggled on.
      AUTH_FORCE_PASSWORD: ${AUTH_FORCE_PASSWORD:-}
      # Public origin for redirect URLs (OIDC + Google calendar callbacks). Set this
      # to your real host when not on localhost; empty → derived from request headers.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:?Run ./waffled up to generate POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # --- Media/blob uploads (local disk): api writes blobs, Caddy serves them.
      # Files land in MEDIA_DIR (the waffled_media volume) and are served read-only by
      # Caddy at MEDIA_BASE_URL, so the api stays out of the read path.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MEDIA_DIR: ${MEDIA_DIR:-/data/media}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-/media}
      # Returned by /api/powersync/token so clients know where to connect.
      POWERSYNC_PUBLIC_URL: ${POWERSYNC_PUBLIC_URL:-http://localhost:8090}
      # Stable RS256 signing key for PowerSync tokens (base64 of a PEM, or raw PEM).
      POWERSYNC_JWT_PRIVATE_KEY: ${POWERSYNC_JWT_PRIVATE_KEY:?Run ./waffled up to generate POWERSYNC_JWT_PRIVATE_KEY}
      # --- AI capture bar (6.6): set any subset; pick the active one in Settings.
      # Hosted providers (keys never leave the server):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      # OpenAI-compatible local server (LM Studio / llama.cpp / vLLM): point this at it.
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      # Local Ollama (keeps text on your network). On Docker Desktop reach the host
      # with host.docker.internal; bare Linux: http://172.17.0.1:11434
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      # --- Google Calendar OAuth (5.2): "Connect your calendar". Independent of Auth0.
      # TOKEN_ENCRYPTION_KEY encrypts the stored refresh token (openssl rand -base64 32).
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?Run ./waffled up to generate TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-}
      GOOGLE_CALENDAR_SCOPES: ${GOOGLE_CALENDAR_SCOPES:-}
      # --- OpenTelemetry (optional, OFF by default). Set OTEL_EXPORTER_OTLP_ENDPOINT
      # to export traces+metrics to any OTLP backend. `./waffled observability up` runs a
      # local Grafana stack (the `observability` profile below) and sets this for you.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-waffled-api}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-}
      # Structured logs: LOG_FORMAT=json (default) | pretty; LOG_LEVEL=info default.
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Lets /api/health + `./waffled doctor` expect a recent backup and flag a stale/failed
      # one. Set BACKUP_ENABLED=false if you remove the `backup` service so it won't nag.
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      # In-app update notifier (Settings → System Health). Checks the latest GitHub
      # release of UPDATE_CHECK_REPO ("owner/name"); unset → no check. Operator
      # kill-switch: UPDATE_CHECK_ENABLED=false (no outbound call at all).
      UPDATE_CHECK_ENABLED: ${UPDATE_CHECK_ENABLED:-true}
      UPDATE_CHECK_REPO: ${UPDATE_CHECK_REPO:-kevinpsites/waffled}   # GitHub repo slug for the update notifier
      # --- switch to Auth0 (RS256): set these, then restart the api ---
      # AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      # AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    volumes:
      - waffled_media:/data/media         # uploaded blobs (read-write); Caddy serves them read-only
    ports:
      - "${API_PORT:-3000}:3000"     # direct dev access; also reachable via Caddy /api/*
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  powersync:
    image: journeyapps/powersync-service:1.22.0
    container_name: waffled-powersync
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully   # needs the `powersync` publication (0003)
      api:
        condition: service_started
    command: ['start', '-r', 'unified']    # API server + replication in one container
    volumes:
      - ./powersync:/config:ro             # service.yaml + sync-config.yaml
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
      NODE_OPTIONS: --max-old-space-size=1000
      PS_PORT: 8080
      # Replicate from our DB (needs the `powersync` publication: run `just migrate`).
      PS_DATA_SOURCE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:?Run ./waffled up to generate POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # PowerSync's own bucket storage lives in the powersync_storage database.
      PS_STORAGE_SOURCE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:?Run ./waffled up to generate POSTGRES_PASSWORD}@postgres:5432/powersync_storage
      # JWKS our api serves; clients present tokens minted by /api/powersync/token.
      PS_JWKS_URL: ${PS_JWKS_URL:-http://api:3000/api/auth/keys}
    ports:
      - "${POWERSYNC_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/probes/liveness').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  caddy:
    # Bakes the built web SPA + serves it; defaults to the published GHCR image at the
    # pinned WAFFLED_VERSION (build from source with `./waffled up --build`).
    image: ${WAFFLED_CADDY_IMAGE:-ghcr.io/kevinpsites/waffled-caddy:${WAFFLED_VERSION:-latest}}
    build:
      context: ../..                            # repo root, so the web app is in context
      dockerfile: infra/compose/caddy/Dockerfile
    container_name: waffled-caddy
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "${HTTP_PORT:-8080}:80"
      # - "443:443"                              # enable for tailnet/prod TLS (later)
    environment:
      # unset locally → ":80" (plain HTTP); set to your MagicDNS name for auto-TLS
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro   # web build is baked into the image at /srv
      - waffled_media:/data/media:ro                   # serve uploaded blobs directly (read-only)
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Caddy answers /healthz with 200 (or a 3xx→HTTPS redirect when CADDY_SITE_ADDRESS
      # is a hostname); -sf treats both as success, so this works in local and TLS modes.
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Nightly database (and optional media) backups. On by default, zero-config: dumps
  # land in the `waffled_backups` volume (see BACKUP_HOST_PATH to write to a folder you
  # choose instead, e.g. a mounted drive), pruned after BACKUP_RETENTION_DAYS. Set the
  # BACKUP_S3_* vars to ALSO push each dump offsite to S3 / B2 / R2 / MinIO. Every run
  # is recorded in backup_runs so Settings → System Health + `./waffled doctor` show it.
  #   ./waffled backup            run one now      ./waffled backup list   list dumps
  #   ./waffled restore <file>    restore a dump (destructive; stops the app first)
  backup:
    image: ${WAFFLED_BACKUP_IMAGE:-ghcr.io/kevinpsites/waffled-backup:${WAFFLED_VERSION:-latest}}
    build:
      context: ./backup
    container_name: waffled-backup
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully   # needs the backup_runs table (0071)
      volume-permissions:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:?Run ./waffled up to generate POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BACKUP_DIR: /backups
      TZ: ${TZ:-UTC}
      BACKUP_TIME: ${BACKUP_TIME:-02:00}                    # daily HH:MM (container TZ)
      BACKUP_ON_START: ${BACKUP_ON_START:-false}            # also back up right after start
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}   # local prune age
      BACKUP_INCLUDE_MEDIA: ${BACKUP_INCLUDE_MEDIA:-false}  # also archive uploaded media
      MEDIA_DIR: /data/media
      # Optional offsite copy. Leave BACKUP_S3_BUCKET empty for local-only.
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}               # e.g. s3://my-bucket/waffled
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}           # set for B2/R2/MinIO; empty=AWS
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${BACKUP_S3_REGION:-us-east-1}
    volumes:
      # Default: the waffled_backups named volume. Set BACKUP_HOST_PATH=/some/dir to write
      # dumps to a host folder of your choice instead (compose treats a path as a bind).
      - ${BACKUP_HOST_PATH:-waffled_backups}:/backups
      - waffled_media:/data/media:ro
    restart: unless-stopped

  # Optional all-in-one local OpenTelemetry backend — Grafana + Prometheus/Mimir +
  # Tempo + Loki in one container. Started only with the `observability` profile
  # (`./waffled observability up`); receives OTLP from the api and gives you Grafana
  # dashboards entirely on your machine. Nothing leaves the host.
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: waffled-lgtm
    profiles: ["observability"]
    ports:
      - "${GRAFANA_PORT:-3001}:3000"   # Grafana UI (api already owns :3000)
      - "${OTLP_GRPC_PORT:-4317}:4317" # OTLP gRPC
      - "${OTLP_HTTP_PORT:-4318}:4318" # OTLP HTTP/protobuf
    volumes:
      - lgtm_data:/data
    healthcheck:
      # Grafana (bundled in otel-lgtm) answers /api/health with 200 once the stack is up.
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  waffled_media:        # uploaded media blobs — NEVER WIPE (like pgdata)
  waffled_backups:      # nightly DB/media dumps (default target; override via BACKUP_HOST_PATH)
  caddy_data:
  caddy_config:
  lgtm_data:         # Grafana/Prometheus/Tempo/Loki state (observability profile)
